<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000; color:#fff;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; overflow:hidden; position:relative;
  }
  .scanlines {
    pointer-events:none; position:fixed; inset:0;
    background:repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
    z-index:10;
  }
  .vignette {
    pointer-events:none; position:fixed; inset:0;
    background:radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.9) 100%);
    z-index:9;
  }
  .glitch-container { position:relative; text-align:center; z-index:5; }
  .main-text {
    font-family:'Bebas Neue', Arial Black, sans-serif;
    font-size:clamp(3rem,13vw,11rem);
    letter-spacing:0.04em; color:#fff; text-transform:uppercase;
    position:relative; animation:glitch 1.6s infinite;
    text-shadow:0 0 30px #fff, 0 0 60px rgba(255,255,255,0.3);
  }
  .main-text::before, .main-text::after {
    content:attr(data-text); position:absolute; left:0; top:0; width:100%;
  }
  .main-text::before {
    color:#f00; clip-path:polygon(0 0,100% 0,100% 38%,0 38%);
    animation:glitch-top 1.6s infinite;
  }
  .main-text::after {
    color:#0ff; clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);
    animation:glitch-bot 1.6s infinite;
  }
  @keyframes glitch {
    0%,88%,100% { transform:none; }
    90% { transform:skewX(-3deg) translateX(4px); }
    93% { transform:skewX(3deg) translateX(-4px); }
    96% { transform:none; }
  }
  @keyframes glitch-top {
    0%,88%,100% { transform:none; opacity:0; }
    90% { transform:translateX(-5px); opacity:1; }
    93% { transform:translateX(5px); opacity:1; }
    96% { opacity:0; }
  }
  @keyframes glitch-bot {
    0%,88%,100% { transform:none; opacity:0; }
    90% { transform:translateX(5px); opacity:1; }
    93% { transform:translateX(-5px); opacity:1; }
    96% { opacity:0; }
  }
  .sub-text {
    font-family:'Bebas Neue', Arial Black, sans-serif;
    font-size:clamp(1rem,4vw,2.8rem); letter-spacing:0.35em;
    color:#888; text-transform:uppercase; margin-top:0.4rem;
    animation:flicker 2.8s infinite;
  }
  @keyframes flicker {
    0%,100% { opacity:1; }
    45% { opacity:1; } 46% { opacity:0.3; } 47% { opacity:1; }
    70% { opacity:1; } 71% { opacity:0.1; } 72% { opacity:1; }
  }
  .images-row {
    display:flex; gap:2.5rem; margin-top:2.5rem;
    align-items:flex-end; justify-content:center; flex-wrap:wrap;
  }
  .img-wrap {
    overflow:hidden; border:1px solid rgba(255,255,255,0.12);
    filter:grayscale(100%) contrast(1.25);
  }
  .img-wrap.troll {
    width:clamp(140px,20vw,260px);
    animation:shake 0.35s infinite;
  }
  .img-wrap.sigma {
    width:clamp(160px,24vw,320px);
    animation:sway 2.2s ease-in-out infinite;
  }
  .img-wrap img { width:100%; display:block; }
  @keyframes shake {
    0%,100% { transform:rotate(-1.5deg) translateX(0); }
    25% { transform:rotate(2deg) translateX(3px); }
    75% { transform:rotate(-2deg) translateX(-3px); }
  }
  @keyframes sway {
    0%,100% { transform:rotate(-0.6deg); }
    50% { transform:rotate(0.6deg); }
  }
</style>
